<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro Max</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0F0F1A; --surface: #1A1A2E; --primary: #FFB74D;
            --text: #E0E0E0; --success: #4CAF50; --error: #FF5252;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        header { padding: 15px 20px; background: var(--surface); display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        #u-xp { color: var(--primary); font-weight: bold; font-size: 1.2rem; }

        main { flex: 1; position: relative; overflow-y: auto; padding-bottom: 70px; }
        .page { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .menu-card { background: var(--surface); padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid var(--primary); cursor: pointer; }
        .menu-card:active { transform: scale(0.98); }

        .game-card { width: 100%; height: 200px; background: var(--surface); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 30px; border: 2px solid rgba(255,183,77,0.3); }
        
        .grid-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .opt-btn { background: var(--surface); border: 1px solid var(--primary); color: white; padding: 20px; border-radius: 12px; font-size: 1.1rem; }
        
        .sentence-zone { min-height: 80px; background: rgba(255,255,255,0.05); border: 2px dashed var(--primary); border-radius: 15px; padding: 10px; margin: 20px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: var(--primary); color: #000; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .chip.pool { background: var(--surface); color: var(--text); border: 1px solid var(--primary); }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--surface); display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-item { font-size: 0.8rem; text-align: center; opacity: 0.6; }
        .nav-item.active { opacity: 1; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div id="u-info">👤 <span id="u-name">Мехмон</span></div>
    <div>⭐ <span id="u-xp">0</span></div>
</header>

<main>
    <section id="p-home" class="page active">
        <h2 style="margin-bottom: 20px;">Интихоби бозӣ</h2>
        <div class="menu-card" onclick="App.game.duels.init()">
            <h3>⚔️ Дуэли слов</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">Быстрый перевод слов</p>
        </div>
        <div class="menu-card" onclick="App.game.build.init()">
            <h3>🧱 Сборщик фраз</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">Составь предложение из кусочков</p>
        </div>
    </section>

    <section id="g-duels" class="page">
        <div id="d-word" class="game-card">...</div>
        <div class="grid-opts" id="d-opts"></div>
    </section>

    <section id="g-build" class="page">
        <h3 id="b-task" style="text-align: center; margin-bottom: 15px;"></h3>
        <div id="b-target" class="sentence-zone"></div>
        <div id="b-pool" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;"></div>
        <button onclick="App.game.build.check()" style="width:100%; margin-top:20px; padding:15px; background:var(--primary); border:none; border-radius:10px; font-weight:bold;">ПРОВЕРИТЬ</button>
    </section>
</main>

<nav class="nav-bar">
    <div class="nav-item active" onclick="App.nav('p-home')">🏠<br>Главная</div>
    <div class="nav-item" onclick="App.nav('p-home')">🏆<br>Рейтинг</div>
</nav>

<script>
const App = {
    tg: window.Telegram.WebApp,
    xp: parseInt(localStorage.getItem('xp_save')) || 0,
    
    // Расширенная база данных
    db: {
        words: [
            {q:'Нон', a:'Хлеб'}, {q:'Об', a:'Вода'}, {q:'Китоб', a:'Книга'},
            {q:'Хона', a:'Дом'}, {q:'Шаҳр', a:'Город'}, {q:'Дӯст', a:'Друг'},
            {q:'Осмон', a:'Небо'}, {q:'Хуршед', a:'Солнце'}, {q:'Мактаб', a:'Школа'}
        ],
        phrases: [
            {ru:'Я пью воду', tg:['Ман', 'об', 'мехӯрам']},
            {ru:'Книга на столе', tg:['Китоб', 'дар', 'болои', 'миз', 'аст']},
            {ru:'Мы идем домой', tg:['Мо', 'ба', 'хона', 'меравем']}
        ]
    },

    init() {
        this.tg.ready();
        this.tg.expand();
        this.updateXP(0);
        document.getElementById('u-name').innerText = this.tg.initDataUnsafe?.user?.first_name || "Мехмон";
    },

    nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id !== 'p-home') this.tg.BackButton.show();
        else this.tg.BackButton.hide();
    },

    updateXP(v) {
        this.xp += v;
        localStorage.setItem('xp_save', this.xp);
        document.getElementById('u-xp').innerText = this.xp;
    },

    utils: {
        shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
    },

    game: {
        duels: {
            queue: [],
            init() {
                this.queue = App.utils.shuffle([...App.db.words]);
                App.nav('g-duels');
                this.next();
            },
            next() {
                if(this.queue.length === 0) this.queue = App.utils.shuffle([...App.db.words]);
                const cur = this.queue.pop();
                const card = document.getElementById('d-word');
                card.innerText = cur.q;
                card.style.background = 'var(--surface)';

                let wrong = App.db.words.filter(w => w.a !== cur.a);
                let alt = wrong[Math.floor(Math.random()*wrong.length)].a;
                
                const opts = App.utils.shuffle([cur.a, alt]);
                const cont = document.getElementById('d-opts');
                cont.innerHTML = '';
                
                opts.forEach(o => {
                    const btn = document.createElement('button');
                    btn.className = 'opt-btn';
                    btn.innerText = o;
                    btn.onclick = () => {
                        if(o === cur.a) {
                            card.style.background = 'var(--success)';
                            App.updateXP(10);
                            setTimeout(() => this.next(), 500);
                        } else {
                            card.style.background = 'var(--error)';
                            App.tg.HapticFeedback.notificationOccurred('error');
                        }
                    };
                    cont.appendChild(btn);
                });
            }
        },
        build: {
            curIdx: 0,
            userWords: [],
            init() {
                this.curIdx = Math.floor(Math.random() * App.db.phrases.length);
                this.userWords = [];
                App.nav('g-build');
                this.render();
            },
            render() {
                const data = App.db.phrases[this.curIdx];
                document.getElementById('b-task').innerText = data.ru;
                
                const target = document.getElementById('b-target');
                target.innerHTML = '';
                this.userWords.forEach((w, i) => {
                    const c = document.createElement('div');
                    c.className = 'chip';
                    c.innerText = w;
                    c.onclick = () => { this.userWords.splice(i, 1); this.render(); };
                    target.appendChild(c);
                });

                const pool = document.getElementById('b-pool');
                pool.innerHTML = '';
                // Показываем только те слова, которые еще не выбраны
                let available = [...data.tg];
                this.userWords.forEach(uw => {
                    let idx = available.indexOf(uw);
                    if(idx > -1) available.splice(idx, 1);
                });

                available.forEach(w => {
                    const c = document.createElement('div');
                    c.className = 'chip pool';
                    c.innerText = w;
                    c.onclick = () => { this.userWords.push(w); this.render(); };
                    pool.appendChild(c);
                });
            },
            check() {
                const data = App.db.phrases[this.curIdx];
                if(this.userWords.join(' ') === data.tg.join(' ')) {
                    App.updateXP(20);
                    App.tg.HapticFeedback.notificationOccurred('success');
                    // Переход к следующему
                    this.curIdx = (this.curIdx + 1) % App.db.phrases.length;
                    this.userWords = [];
                    this.render();
                } else {
                    alert("Хато! Попробуй другой порядок.");
                    App.tg.HapticFeedback.notificationOccurred('warning');
                }
            }
        }
    }
};

App.init();
App.tg.BackButton.onClick(() => App.nav('p-home'));
</script>
</body>
</html>
