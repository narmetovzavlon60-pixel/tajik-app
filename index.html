<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Cloud Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg:#0F0F1A; --surf:#1A1A2E; --prim:#FFB74D; --text:#E0E0E0; --green:#4CAF50; --red:#FF5252; }
        *{ box-sizing:border-box; margin:0; padding:0; font-family:sans-serif;
           -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
        body{ background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
        header{ padding:8px 12px; background:var(--surf); display:flex; justify-content:space-between;
                align-items:center; border-bottom:2px solid var(--prim); gap:6px; flex-shrink:0; }
        .page{ display:none; padding:16px; flex:1; overflow-y:auto; }
        .active{ display:block; }
        .card{ background:var(--surf); padding:16px; border-radius:15px; margin-bottom:10px;
               border-left:4px solid var(--prim); cursor:pointer; }
        .game-display{ height:130px; background:rgba(255,255,255,0.05); border-radius:15px;
                       display:flex; flex-direction:column; align-items:center; justify-content:center;
                       margin-bottom:16px; }
        .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .btn-opt{ background:var(--surf); border:1px solid var(--prim); color:white;
                  padding:18px 5px; border-radius:12px; font-size:0.95rem; cursor:pointer; width:100%; }
        .main-action{ width:100%; padding:16px; background:var(--prim); border:none;
                      border-radius:12px; font-weight:800; color:#000; margin-top:12px; cursor:pointer; font-size:1rem; }
        .drop-zone{ min-height:56px; background:rgba(255,255,255,0.03); border:1px dashed var(--prim);
                    border-radius:12px; padding:8px; margin-bottom:12px; display:flex; flex-wrap:wrap; gap:5px; }
        .chip{ background:var(--prim); color:#000; padding:7px 11px; border-radius:8px;
               font-weight:bold; cursor:pointer; user-select:none; }
        .modal{ position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg);
                display:none; flex-direction:column; align-items:center; justify-content:center;
                z-index:1000; padding:20px; text-align:center; }
        nav{ background:var(--surf); display:flex; justify-content:space-around;
             padding:8px; border-top:1px solid #333; flex-shrink:0; }
        .nav-btn{ opacity:0.5; text-align:center; font-size:0.75rem; cursor:pointer; padding:4px 8px; }
        .nav-btn.active{ opacity:1; color:var(--prim); }
        .rank-badge{ font-size:0.7rem; background:rgba(255,183,77,0.15); border:1px solid var(--prim);
                     padding:3px 7px; border-radius:10px; white-space:nowrap; }
        .xp-bar-wrap{ height:6px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
        .xp-bar{ height:100%; background:var(--prim); border-radius:3px; transition:width .4s ease; }
        .daily-card{ background:var(--surf); border-radius:15px; padding:13px; margin-bottom:10px; }
        .stat-row{ display:flex; justify-content:space-between; align-items:center; padding:5px 0;
                   border-bottom:1px solid rgba(255,255,255,0.05); }
        .stat-row:last-child{ border-bottom:none; }
        #rank-flash{ position:fixed; top:60px; left:50%; transform:translateX(-50%);
                     background:var(--prim); color:#000; padding:8px 20px; border-radius:20px;
                     font-weight:800; font-size:0.9rem; opacity:0; transition:opacity .4s; z-index:500;
                     pointer-events:none; white-space:nowrap; }
        .res-info{ white-space:pre-line; margin:16px; font-size:1.1rem; line-height:1.7; }
    </style>
</head>
<body>

<header>
    <div id="u-lives" style="color:var(--red);font-size:0.9rem">❤️❤️❤️</div>
    <div id="u-rank" class="rank-badge">🌱 Навчӣ</div>
    <div style="font-size:0.9rem">⭐ <span id="u-xp">0</span></div>
</header>

<div id="rank-flash"></div>

<div id="res-modal" class="modal">
    <h1 id="res-status">БОЗӢ ТАМОМ</h1>
    <div id="res-rank-up" style="display:none;color:var(--prim);font-size:1.4rem;margin-top:10px;"></div>
    <p class="res-info" id="res-info"></p>
    <button class="main-action" style="width:80%;max-width:300px" onclick="location.reload()">ИГРАТЬ СНОВА</button>
</div>

<main style="flex:1;overflow:hidden;display:flex;flex-direction:column;">

    <!-- HOME -->
    <section id="p-home" class="page active">
        <div class="daily-card">
            <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
                <span>📅 Цель дня</span>
                <span id="daily-txt" style="color:var(--prim);font-weight:bold">0 / 100 XP</span>
            </div>
            <div class="xp-bar-wrap"><div id="daily-bar" class="xp-bar" style="width:0%"></div></div>
        </div>
        <div class="card" onclick="startSprint()">
            <h3>⚡ Спринт</h3>
            <p style="opacity:0.7;font-size:0.85rem;margin-top:3px">30 секунд · 3 жизни · комбо-бонус</p>
        </div>
        <div class="card" onclick="startDuels()">
            <h3>⚔️ Дуэли</h3>
            <p style="opacity:0.7;font-size:0.85rem;margin-top:3px">Выбери правильный перевод</p>
        </div>
        <div class="card" onclick="startBuild()">
            <h3>🧱 Созандаи ҷумла</h3>
            <p style="opacity:0.7;font-size:0.85rem;margin-top:3px">Собери фразу из слов</p>
        </div>
    </section>

    <!-- STATS -->
    <section id="p-stats" class="page">
        <h2 style="margin-bottom:12px;color:var(--prim)">📊 Мои успехи</h2>
        <div class="card" style="border-left-color:var(--prim)">
            <div id="stats-emoji" style="font-size:2.5rem;text-align:center;margin-bottom:6px"></div>
            <div id="stats-rname" style="text-align:center;font-size:1.1rem;font-weight:bold;margin-bottom:10px"></div>
            <div class="stat-row"><span>Всего XP</span><span id="stats-xp" style="color:var(--prim);font-weight:bold"></span></div>
            <div class="stat-row"><span>До следующего ранга</span><span id="stats-next" style="font-size:0.85rem"></span></div>
            <div class="xp-bar-wrap" style="margin-top:8px"><div id="stats-bar" class="xp-bar" style="width:0%"></div></div>
        </div>
        <div class="card">
            <div class="stat-row"><span>📅 Сегодня</span><span id="stats-daily"></span></div>
            <div class="stat-row"><span>🔥 Серия дней</span><span id="stats-streak"></span></div>
            <div class="stat-row"><span>🏆 Лучшее комбо</span><span id="stats-combo"></span></div>
        </div>
        <div class="card">
            <h4 style="color:var(--prim);margin-bottom:8px">Все ранги:</h4>
            <div id="ranks-list"></div>
        </div>
    </section>

    <!-- SPRINT -->
    <section id="g-sprint" class="page">
        <div id="timer" style="text-align:center;font-weight:bold;color:var(--prim);font-size:1.1rem;margin-bottom:8px">30s</div>
        <div class="game-display">
            <div id="spr-q" style="font-size:2rem;font-weight:bold"></div>
            <div id="spr-a" style="opacity:0.65;margin-top:6px;font-size:1rem"></div>
        </div>
        <div class="grid-2">
            <button class="btn-opt" onclick="checkSprint(false)">✗ НЕВЕРНО</button>
            <button class="btn-opt" onclick="checkSprint(true)">✓ ВЕРНО</button>
        </div>
        <div id="spr-combo" style="text-align:center;margin-top:10px;color:var(--prim);font-size:0.85rem;height:20px"></div>
    </section>

    <!-- DUELS -->
    <section id="g-duels" class="page">
        <div class="game-display">
            <h2 id="duel-q" style="text-align:center;padding:10px;font-size:1.6rem"></h2>
        </div>
        <div id="duel-opts" class="grid-2"></div>
        <div id="duel-combo" style="text-align:center;margin-top:10px;color:var(--prim);font-size:0.85rem;height:20px"></div>
    </section>

    <!-- BUILD -->
    <section id="g-build" class="page">
        <p id="build-task" style="text-align:center;margin-bottom:10px;font-size:1.05rem;font-weight:bold"></p>
        <div id="build-target" class="drop-zone"></div>
        <div id="build-pool" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px;min-height:40px;"></div>
        <button class="main-action" onclick="checkBuild()">✓ ПРОВЕРИТЬ</button>
    </section>

</main>

<nav>
    <div class="nav-btn active" id="nav-home" onclick="goNav('p-home','nav-home')">🏠<br>Асосӣ</div>
    <div class="nav-btn" id="nav-stats" onclick="goNav('p-stats','nav-stats')">🏆<br>Натиҷаҳо</div>
</nav>

// Кэш длин массивов — избегаем повторных обращений к .length
const W_LEN = db.words.length;
const P_LEN = db.phrases.length;

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
const rndIdx = len => (Math.random() * len) | 0;

function addXP(amount) {
    const oldRank = getRank(xp);
    xp          += amount;
    sessionXP   += amount;
    dailyXP     += amount;
    try { localStorage.setItem('daily_v1', JSON.stringify({date:today, xp:dailyXP})); } catch(e){}
    const newRank = getRank(xp);
    if (newRank.min !== oldRank.min) rankUpFlash(newRank);
    updateUI();
}

let _flashTO = null;
function rankUpFlash(rank) {
    const el = document.getElementById('rank-flash');
    el.textContent = '🎉 Новый ранг: ' + rank.emoji + ' ' + rank.name + '!';
    el.style.opacity = '1';
    if (_flashTO) clearTimeout(_flashTO);
    _flashTO = setTimeout(() => { el.style.opacity = '0'; }, 2500);
    tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
}

function saveProgress() {
    try { localStorage.setItem('xp_v7', xp); } catch(e){}
    if (maxCombo > bestCombo) {
        bestCombo = maxCombo;
        try { localStorage.setItem('best_combo_v1', bestCombo); } catch(e){}
    }
    if (tg.CloudStorage) tg.CloudStorage.setItem('user_xp_v2', xp.toString());
}

function loadFromCloud() {
    if (tg.CloudStorage) {
        tg.CloudStorage.getItem('user_xp_v2', (err, val) => {
            if (!err && val) {
                const v = parseInt(val);
                if (v > xp) { xp = v; updateUI(); }
            }
        });
    }
}

function go(id) {
    const pages = document.querySelectorAll('.page');
    for (let i = 0; i < pages.length; i++) pages[i].style.display = 'none';
    document.getElementById(id).style.display = 'block';
}

function goNav(pageId, navId) {
    go(pageId);
    const btns = document.querySelectorAll('.nav-btn');
    for (let i = 0; i < btns.length; i++) btns[i].classList.remove('active');
    document.getElementById(navId).classList.add('active');
    if (pageId === 'p-stats') renderStats();
}

function updateUI() {
    document.getElementById('u-xp').innerText = xp;
    let l = '';
    for (let i = 0; i < 3; i++) l += (i < lives) ? '❤️' : '🖤';
    document.getElementById('u-lives').innerText = l;

    const rank = getRank(xp);
    document.getElementById('u-rank').innerText = rank.emoji + ' ' + rank.name;

    const pct = Math.min(100, (dailyXP / DAILY_GOAL * 100) | 0);
    document.getElementById('daily-txt').innerText = dailyXP + ' / ' + DAILY_GOAL + ' XP';
    document.getElementById('daily-bar').style.width = pct + '%';

    if (lives <= 0) end();
}

function end() {
    clearInterval(window.tmr);
    saveProgress();
    const newRank  = getRank(xp);
    const prevRank = getRank(prevXP);
    const rankUpEl = document.getElementById('res-rank-up');
    if (newRank.min !== prevRank.min) {
        rankUpEl.innerText  = '🎉 Новый ранг: ' + newRank.emoji + ' ' + newRank.name + '!';
        rankUpEl.style.display = 'block';
    } else {
        rankUpEl.style.display = 'none';
    }
    const dailyDone = dailyXP >= DAILY_GOAL ? ' ✅' : '';
    document.getElementById('res-info').innerText =
        'XP за сессию: +' + sessionXP +
        '\nЛучшее комбо: x' + maxCombo +
        '\n📅 Сегодня: ' + dailyXP + '/' + DAILY_GOAL + ' XP' + dailyDone;
    document.getElementById('res-modal').style.display = 'flex';
}

// ═══════════════════════════════════════════
//  STATS PAGE
// ═══════════════════════════════════════════
function renderStats() {
    const rank  = getRank(xp);
    const nextR = getNextRank(xp);
    document.getElementById('stats-emoji').innerText  = rank.emoji;
    document.getElementById('stats-rname').innerText  = rank.name + ' — ' + rank.label;
    document.getElementById('stats-xp').innerText     = xp + ' XP';
    document.getElementById('stats-daily').innerText  = dailyXP + ' / ' + DAILY_GOAL + ' XP';
    document.getElementById('stats-streak').innerText = streak + ' дн.';
    document.getElementById('stats-combo').innerText  = 'x' + bestCombo;

    if (nextR) {
        const prog   = xp - rank.min;
        const needed = nextR.min - rank.min;
        const pct    = Math.min(100, (prog / needed * 100) | 0);
        document.getElementById('stats-next').innerText = (nextR.min - xp) + ' XP → ' + nextR.emoji + nextR.name;
        document.getElementById('stats-bar').style.width = pct + '%';
    } else {
        document.getElementById('stats-next').innerText = '👑 Максимальный ранг!';
        document.getElementById('stats-bar').style.width = '100%';
    }

    const list = document.getElementById('ranks-list');
    list.innerHTML = '';
    const frag = document.createDocumentFragment();
    const cur  = getRank(xp);
    RANKS.forEach(r => {
        const d  = document.createElement('div');
        const on = xp >= r.min;
        const ac = cur.min === r.min;
        d.style.cssText = 'display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);';
        d.innerHTML = '<span style="opacity:' + (on?1:0.4) + '">' + r.emoji + ' ' + r.name + '</span>' +
                      '<span style="opacity:' + (on?1:0.4) + ';color:' + (ac?'var(--prim)':'inherit') + '">' +
                      r.min + ' XP' + (ac?' ◀':'') + '</span>';
        frag.appendChild(d);
    });
    list.appendChild(frag);
}

// ═══════════════════════════════════════════
//  SPRINT
// ═══════════════════════════════════════════
let sprCur = false;
function startSprint() {
    lives = 3; sessionXP = 0; combo = 0; maxCombo = 0; prevXP = xp;
    updateUI(); go('g-sprint'); nextSprint();
    let t = 30;
    clearInterval(window.tmr);
    window.tmr = setInterval(() => {
        document.getElementById('timer').innerText = (--t) + 's';
        if (t <= 0) end();
    }, 1000);
}

function nextSprint() {
    const isTrue = Math.random() > 0.5;
    const idx    = rndIdx(W_LEN);
    const w      = db.words[idx];
    document.getElementById('spr-q').innerText = w.q;
    sprCur = isTrue;
    if (isTrue) {
        document.getElementById('spr-a').innerText = w.a;
    } else {
        let fi;
        do { fi = rndIdx(W_LEN); } while (fi === idx);
        document.getElementById('spr-a').innerText = db.words[fi].a;
    }
}

function checkSprint(ans) {
    if (ans === sprCur) {
        if (++combo > maxCombo) maxCombo = combo;
        addXP(10 + Math.min(combo, 10));
        document.getElementById('spr-combo').innerText = combo > 1 ? '🔥 Комбо x' + combo : '';
        tg.HapticFeedback && tg.HapticFeedback.impactOccurred('light');
    } else {
        lives--; combo = 0;
        document.getElementById('spr-combo').innerText = '';
        tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('error');
        updateUI();
    }
    if (lives > 0) nextSprint();
}

// ═══════════════════════════════════════════
//  DUELS
// ═══════════════════════════════════════════
let duelAns = '';
function startDuels() { lives = 3; sessionXP = 0; combo = 0; maxCombo = 0; prevXP = xp; updateUI(); go('g-duels'); nextDuel(); }

function nextDuel() {
    const idx  = rndIdx(W_LEN);
    const cur  = db.words[idx];
    document.getElementById('duel-q').innerText = cur.q;
    duelAns = cur.a;

    // Build 4 unique options efficiently
    const opts = [cur.a];
    const used = new Set([idx]);
    while (opts.length < 4) {
        let r;
        do { r = rndIdx(W_LEN); } while (used.has(r));
        used.add(r);
        const cand = db.words[r].a;
        if (!opts.includes(cand)) opts.push(cand);
    }
    // Fisher-Yates shuffle
    for (let i = opts.length - 1; i > 0; i--) {
        const j = (Math.random() * (i+1)) | 0;
        [opts[i], opts[j]] = [opts[j], opts[i]];
    }

    const box  = document.getElementById('duel-opts');
    const frag = document.createDocumentFragment();
    box.innerHTML = '';
    opts.forEach(o => {
        const b = document.createElement('button');
        b.className   = 'btn-opt';
        b.textContent = o;
        b.onclick = () => {
            if (o === duelAns) {
                if (++combo > maxCombo) maxCombo = combo;
                addXP(10 + Math.min(combo, 5));
                document.getElementById('duel-combo').innerText = combo > 1 ? '🔥 Комбо x' + combo : '';
                tg.HapticFeedback && tg.HapticFeedback.impactOccurred('medium');
                nextDuel();
            } else {
                lives--; combo = 0;
                document.getElementById('duel-combo').innerText = '';
                tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('warning');
                updateUI();
                if (lives > 0) nextDuel();
            }
        };
        frag.appendChild(b);
    });
    box.appendChild(frag);
}

// ═══════════════════════════════════════════
//  BUILD
// ═══════════════════════════════════════════
let curP = null, chosen = [];
function startBuild() { lives = 3; sessionXP = 0; prevXP = xp; go('g-build'); chosen = []; nextBuild(); }

function nextBuild() {
    curP = db.phrases[rndIdx(P_LEN)];
    document.getElementById('build-task').innerText = curP.ru;
    renderBuild();
}

function renderBuild() {
    const target = document.getElementById('build-target');
    const pool   = document.getElementById('build-pool');
    const frag1  = document.createDocumentFragment();
    chosen.forEach((w, i) => {
        const c = document.createElement('div');
        c.className   = 'chip';
        c.textContent = w;
        const idx = i;
        c.onclick = () => { chosen.splice(idx, 1); renderBuild(); };
        frag1.appendChild(c);
    });
    target.innerHTML = '';
    target.appendChild(frag1);

    // Remaining words
    const rem = curP.tg.slice();
    chosen.forEach(cw => { const p = rem.indexOf(cw); if (p > -1) rem.splice(p, 1); });
    const frag2 = document.createDocumentFragment();
    rem.forEach(w => {
        const c = document.createElement('div');
        c.className   = 'chip';
        c.textContent = w;
        c.style.cssText = 'background:#1A1A2E;color:white;border:1px solid var(--prim);';
        c.onclick = () => { chosen.push(w); renderBuild(); };
        frag2.appendChild(c);
    });
    pool.innerHTML = '';
    pool.appendChild(frag2);
}

function checkBuild() {
    if (chosen.join(' ') === curP.tg.join(' ')) {
        addXP(30);
        tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
        chosen = [];
        nextBuild();
    } else {
        lives--;
        tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('error');
        updateUI();
    }
}
