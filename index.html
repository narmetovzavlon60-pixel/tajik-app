<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tajik Pro: Cloud Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0F0F1A; --surf: #1A1A2E; --prim: #FFB74D; --text: #E0E0E0; --green: #4CAF50; --red: #FF5252; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { padding: 15px; background: var(--surf); display: flex; justify-content: space-between; border-bottom: 2px solid var(--prim); }
        .page { display: none; padding: 20px; flex: 1; overflow-y: auto; }
        .active { display: block; }
        .card { background: var(--surf); padding: 20px; border-radius: 15px; margin-bottom: 12px; border-left: 4px solid var(--prim); }
        .game-display { height: 140px; background: rgba(255,255,255,0.05); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-opt { background: var(--surf); border: 1px solid var(--prim); color: white; padding: 20px 5px; border-radius: 12px; font-size: 1rem; }
        .main-action { width: 100%; padding: 18px; background: var(--prim); border: none; border-radius: 12px; font-weight: 800; color: #000; margin-top: 15px; }
        .drop-zone { min-height: 60px; background: rgba(255,255,255,0.03); border: 1px dashed var(--prim); border-radius: 12px; padding: 10px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 5px; }
        .chip { background: var(--prim); color: #000; padding: 8px 12px; border-radius: 8px; font-weight: bold; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        nav { background: var(--surf); display: flex; justify-content: space-around; padding: 10px; border-top: 1px solid #333; }
        .nav-btn { opacity: 0.5; text-align: center; font-size: 0.8rem; }
        .nav-btn.active { opacity: 1; color: var(--prim); }
    </style>
</head>
<body>

<header>
    <div id="u-lives" style="color:var(--red)">❤️❤️❤️</div>
    <div>⭐ <span id="u-xp">0</span></div>
</header>

<div id="res-modal" class="modal">
    <h1 id="res-status">БОЗӢ ТАМОМ</h1>
    <p id="res-info" style="margin:20px; font-size:1.2rem;"></p>
    <button class="main-action" style="width:80%" onclick="location.reload()">ОБНОВИТЬ</button>
</div>

<main style="flex:1; overflow:hidden;">
    <section id="p-home" class="page active">
        <div class="card" onclick="startSprint()">
            <h3>⚡ Спринт</h3>
            <p>30 секунд и 3 жизни</p>
        </div>
        <div class="card" onclick="startDuels()">
            <h3>⚔️ Дуэли калимаҳо</h3>
            <p>Выбери правильный перевод</p>
        </div>
        <div class="card" onclick="startBuild()">
            <h3>🧱 Созандаи ҷумла</h3>
            <p>Собери фразу</p>
        </div>
    </section>

    <section id="g-sprint" class="page">
        <div id="timer" style="text-align:center; font-weight:bold; color:var(--prim)">30s</div>
        <div class="game-display">
            <div id="spr-q" style="font-size:2rem; font-weight:bold"></div>
            <div id="spr-a" style="opacity:0.6"></div>
        </div>
        <div class="grid-2">
            <button class="btn-opt" onclick="checkSprint(false)">НЕВЕРНО</button>
            <button class="btn-opt" onclick="checkSprint(true)">ВЕРНО</button>
        </div>
    </section>

    <section id="g-duels" class="page">
        <div class="game-display"><h2 id="duel-q"></h2></div>
        <div id="duel-opts" class="grid-2"></div>
    </section>

    <section id="g-build" class="page">
        <p id="build-task" style="text-align:center; margin-bottom:10px;"></p>
        <div id="build-target" class="drop-zone"></div>
        <div id="build-pool" style="display:flex; flex-wrap:wrap; gap:8px; justify-content:center;"></div>
        <button class="main-action" onclick="checkBuild()">ПРОВЕРИТЬ</button>
    </section>
</main>

<nav>
    <div class="nav-btn active" onclick="go('p-home')">🏠<br>Асосӣ</div>
    <div class="nav-btn" onclick="alert('Рейтинг скоро вернется!')">🏆<br>Рейтинг</div>
</nav>

<script>
const tg = window.Telegram.WebApp;
let xp = parseInt(localStorage.getItem('xp_v6')) || 0;
let lives = 3;
let sessionXP = 0;
let combo = 0;
let maxCombo = 0;

const db = {
    words: [
        {q:'Нон', a:'Хлеб'}, {q:'Об', a:'Вода'}, {q:'Хона', a:'Дом'}, {q:'Китоб', a:'Книга'},
        {q:'Шаҳр', a:'Город'}, {q:'Дӯст', a:'Друг'}, {q:'Мактаб', a:'Школа'}, {q:'Осмон', a:'Небо'}
    ],
    phrases: [
        {ru:'Как дела?', tg:['Аҳволи', 'шумо', 'чист?']},
        {ru:'Я иду домой', tg:['Ман', 'ба', 'хона', 'меравам']},
        {ru:'Мы идем домой', tg:['Мо', 'ба', 'хона', 'меравам']}
    ]
};

function saveProgress() {
    localStorage.setItem('xp_v6', xp);
    if (tg.CloudStorage) {
        tg.CloudStorage.setItem('user_xp', xp.toString());
    }
}

function loadFromCloud() {
    if (tg.CloudStorage) {
        tg.CloudStorage.getItem('user_xp', (err, value) => {
            if (!err && value) {
                const cloudXP = parseInt(value);
                if (cloudXP > xp) { xp = cloudXP; updateUI(); }
            }
        });
    }
}

function go(id) {
    document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function updateUI() {
    document.getElementById('u-xp').innerText = xp;
    let l = ""; for(let i=0; i<3; i++) l += i < lives ? "❤️" : "🖤";
    document.getElementById('u-lives').innerText = l;
    if(lives <= 0) end();
}

function end() {
    clearInterval(window.tmr);
    document.getElementById('res-info').innerText = `XP: +${sessionXP} | Комбо: x${maxCombo}`;
    document.getElementById('res-modal').style.display = 'flex';
    saveProgress();
}

let sprCur = false;
function startSprint() {
    lives = 3; sessionXP = 0; combo = 0; maxCombo = 0;
    updateUI(); go('g-sprint'); nextSprint();
    let t = 30;
    if(window.tmr) clearInterval(window.tmr);
    window.tmr = setInterval(() => {
        t--; document.getElementById('timer').innerText = t + 's';
        if(t <= 0) end();
    }, 1000);
}

function nextSprint() {
    const isTrue = Math.random() > 0.5;
    const w = db.words[Math.floor(Math.random()*db.words.length)];
    document.getElementById('spr-q').innerText = w.q;
    sprCur = isTrue;
    document.getElementById('spr-a').innerText = isTrue ? w.a : db.words[Math.floor(Math.random()*db.words.length)].a;
}

function checkSprint(ans) {
    if(ans === sprCur) { 
        combo++; if(combo > maxCombo) maxCombo = combo;
        let gain = 10 + combo; sessionXP += gain; xp += gain;
        tg.HapticFeedback.impactOccurred('light');
    } else { 
        lives--; combo = 0; 
        tg.HapticFeedback.notificationOccurred('error');
    }
    updateUI(); if(lives > 0) nextSprint();
}

let duelAns = "";
function startDuels() { lives = 3; sessionXP = 0; updateUI(); go('g-duels'); nextDuel(); }
function nextDuel() {
    const cur = db.words[Math.floor(Math.random()*db.words.length)];
    document.getElementById('duel-q').innerText = cur.q;
    duelAns = cur.a;
    let opts = [cur.a];
    while(opts.length < 4) {
        let r = db.words[Math.floor(Math.random()*db.words.length)].a;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    const box = document.getElementById('duel-opts'); box.innerHTML = '';
    opts.forEach(o => {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = o;
        b.onclick = () => {
            if(o === duelAns) { 
                xp += 10; sessionXP += 10; 
                tg.HapticFeedback.impactOccurred('medium');
                nextDuel(); 
            } else { 
                lives--; tg.HapticFeedback.notificationOccurred('warning');
                updateUI(); if(lives > 0) nextDuel(); 
            }
        };
        box.appendChild(b);
    });
}

let curP = null; let chosen = [];
function startBuild() { lives = 3; sessionXP = 0; go('g-build'); chosen = []; nextBuild(); }
function nextBuild() {
    curP = db.phrases[Math.floor(Math.random()*db.phrases.length)];
    document.getElementById('build-task').innerText = curP.ru;
    renderBuild();
}
function renderBuild() {
    const target = document.getElementById('build-target'); target.innerHTML = '';
    chosen.forEach((w, i) => {
        const c = document.createElement('div'); c.className = 'chip'; c.innerText = w;
        c.onclick = () => { chosen.splice(i,1); renderBuild(); };
        target.appendChild(c);
    });
    const pool = document.getElementById('build-pool'); pool.innerHTML = '';
    let rem = [...curP.tg];
    chosen.forEach(cw => { let p = rem.indexOf(cw); if(p > -1) rem.splice(p, 1); });
    rem.forEach(w => {
        const c = document.createElement('div'); c.className = 'chip'; c.innerText = w;
        c.style.background = "#1A1A2E"; c.style.color = "white"; c.style.border = "1px solid var(--prim)";
        c.onclick = () => { chosen.push(w); renderBuild(); };
        pool.appendChild(c);
    });
}
function checkBuild() {
    if(chosen.join(' ') === curP.tg.join(' ')) { 
        xp += 30; sessionXP += 30; 
        tg.HapticFeedback.notificationOccurred('success');
        startBuild(); 
    } else { 
        lives--; tg.HapticFeedback.notificationOccurred('error');
        updateUI(); 
    }
}

tg.ready();
tg.expand();
loadFromCloud();
updateUI();
</script>
</body>
            </html>
